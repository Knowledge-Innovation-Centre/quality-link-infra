version: '3.8'

services:

  frontend:
    build:
      context: ./03_frontend
    ports:
      - "${FRONTEND_PORT:-3333}:3000"
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./00_postgres:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    command: postgres -c max_connections=100 -c shared_buffers=512MB

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: >
      --bind=0.0.0.0
      --requirepass=${DRAGONFLY_PASSWORD}
      --maxmemory=0
      --dir=/data
      --dbfilename=${DRAGONFLY_DBNAME:-dump}
      --keys_output_limit=${DRAGONFLY_KEYS_OUTPUT_LIMIT:-8192}
      --dbnum=${DRAGONFLY_DBNUM:-6}
      --cache_mode=${DRAGONFLY_CACHE_MODE:-true}
      --hz=${DRAGONFLY_HZ:-100}
      --snapshot_cron="${DRAGONFLY_SNAPSHOT_CRON:-* * * * *}"
      --primary_port_http_enabled=false
    ports:
      - "${DRAGONFLY_PORT:-6379}:6379"
    volumes:
      - dragonfly_data:/data
    depends_on:
      - frontend
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: minio server /data --console-address "0.0.0.0:9001"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    depends_on:
      - frontend
    restart: unless-stopped

  mageai:
    build:
      context: ./01_mage
      args:
        BASE_CODE_PATH: /home/src
        PROJECT_NAME: ql
    command: mage start ql
    environment:
      USER_CODE_PATH: /home/src/ql
      MAGE_DATABASE_CONNECTION_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mage
      REDIS_URL: redis://:${DRAGONFLY_PASSWORD}@dragonfly:6379/0
      REQUIRE_USER_AUTHENTICATION: 1
      DEFAULT_OWNER_EMAIL: ${DEFAULT_OWNER_EMAIL}
      DEFAULT_OWNER_USERNAME: ${DEFAULT_OWNER_USERNAME}
      DEFAULT_OWNER_PASSWORD: ${DEFAULT_OWNER_PASSWORD}
      GIT_REPO_LINK: https://github.com/Knowledge-Innovation-Centre/quality-link-workflows.git
      GIT_REPO_PATH: /home/src/ql
      GIT_SYNC_ON_START: 1
    ports:
      - "${MAGEAI_PORT:-6789}:6789"
    volumes:
      - mageai_projects:/home/src
    depends_on:
      - postgres
      - dragonfly
      - minio
      - frontend
      - backend
      - fuseki
    restart: unless-stopped

  backend:
    build:
      context: ./02_backend
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      BACKEND_REDIS_URL: redis://:${DRAGONFLY_PASSWORD}@dragonfly:6379/1
      MINIO_HOST: minio:9000
      MINIO_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET: ${MINIO_ROOT_PASSWORD}
      BUCKET_NAME: ${BUCKET_NAME:-quality-link-storage}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - postgres
      - dragonfly
      - minio
      - frontend
      - fuseki
    restart: unless-stopped

  fuseki:
    image: stain/jena-fuseki:5.1.0
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD}
      JVM_ARGS: ${FUSEKI_JVM_ARGS:--Xmx2g -XX:+UseContainerSupport}
      ENABLE_UPDATE: ${FUSEKI_ENABLE_UPDATE:-true}
      ENABLE_DATA_WRITE: ${FUSEKI_ENABLE_DATA_WRITE:-true}
      FUSEKI_DATASET_1: ${FUSEKI_DATASET_NAME:-qualitylink}
      FUSEKI_DATASET_1_TDB2: ${FUSEKI_TDB2_ENABLED:-true}
    volumes:
      - fuseki_data:/fuseki
    ports:
      - "${FUSEKI_PORT:-3031}:3030"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  fuseki_data:
  postgres_data:
  dragonfly_data:
  minio_data:
  mageai_projects:
